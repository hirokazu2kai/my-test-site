<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBIK 統合ポータル</title>
    <style>
        /* 画面の余白をゼロにし、スクロールを無効化 */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000; 
        }

        /* アプリ（iframe）を画面いっぱいに広げる */
        #app-frame {
            width: 100%;
            height: 100dvh; /* スマホのバーを考慮した高さ */
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <iframe id="app-frame" src="https://script.google.com/macros/s/AKfycbwWbSECz8Tm7581UzAkVHQJlNfR02UuTBVrVCPJtdklO1ep1LbOWN94XgDBLT3gethk2A/exec"></iframe>

</body>
</html>
